<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico">
<title>CompareGold — Stride Image Comparison</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>CompareGold</h1>
  <span class="subtitle">Stride Image Comparison Tool</span>
  <div class="header-right">
    <span id="hostInfo" class="info-chip host"></span>
    <span id="branchInfo" class="info-chip branch"></span>
    <span id="strideRoot" class="info-chip stride-root"></span>
  </div>
</header>

<div class="panel">
  <div class="panel-row">
    <label>Platform: <select id="platformSelect"><option value="">Loading...</option></select></label>
    <label>Status: <select id="statusFilter">
      <option value="">All</option>
      <option value="fail" selected>Failing</option>
      <option value="new">New</option>
      <option value="pass">Passing</option>
    </select></label>
    <label>Search: <input type="text" id="searchFilter" placeholder="Filter by name..." oninput="render()" style="width:180px"></label>
    <label>Sort: <select id="sortSelect" onchange="render()">
      <option value="name">Name</option>
      <option value="diff">Worst diff first</option>
    </select></label>
  </div>
  <div class="panel-row">
    <span style="color:#888">Sources:</span>
    <div class="source-tags" id="sourceTags"></div>
    <button class="secondary" onclick="addLocalSource()">+ Local</button>
    <button class="secondary" onclick="showCiModal()">+ CI Run...</button>
    <span style="color:#555">│</span>
    <button class="secondary" onclick="selectAllFailing()">Select Failing (<span id="failingCount">0</span>)</button>
    <button class="secondary" onclick="selectFixable()" title="Select images that fail current gold but pass with an alternate gold">Select Fixable (<span id="fixableCount">0</span>)</button>
    <button class="promote" onclick="promoteSelected()">Promote Selected (<span id="selectedCount">0</span>)</button>
    <button class="promote" onclick="deleteSelectedGold()" style="background:#f44336">Delete Gold (<span id="selectedCount2">0</span>)</button>
    <label>from <select id="promoteSource"></select></label>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="emptyMsg" class="empty-msg">Select a suite and platform, then add a source to compare.</div>
</div>

<!-- Fixed Detail Pane -->
<div id="detailPane" class="detail-pane">
  <div id="detailPaneHandle" class="detail-pane-handle" title="Drag to resize"></div>
  <div id="detailPaneContent" class="detail-pane-content">
    <div class="detail-pane-empty">No selection</div>
  </div>
</div>

<!-- Pixel Inspector -->
<div id="pixelInspector" class="pixel-inspector" style="display:none">
  <div class="pi-title">Pixel details:</div>
  <div id="piContent"></div>
</div>

<!-- CI Modal -->
<div id="ciModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeCiModal()">
  <div class="modal">
    <h3>Add CI Run</h3>
    <div id="ciForksSection" style="margin-bottom:8px; font-size:12px">
      <label>Forks (in addition to stride3d/stride):</label>
      <div id="ciForksList" style="margin-top:2px"></div>
      <div style="margin-top:4px">
        <input type="text" id="ciForkInput" placeholder="owner/name" style="width:180px"
               onkeydown="if(event.key==='Enter'){event.preventDefault();addFork();}">
        <button class="secondary" onclick="addFork()" style="padding:2px 8px">Add fork</button>
      </div>
    </div>
    <div id="ciLoading" style="color:#888"><span class="spinner"></span> Loading recent runs...</div>
    <div class="ci-runs-list" id="ciRunsList"></div>
    <div style="margin-top:8px" id="ciArtifactsSection">
      <label>Artifacts:</label>
      <div id="ciArtifactsList" style="margin-top:4px; font-size:12px; color:#888">Select a run to see artifacts</div>
    </div>
    <div style="margin-top:8px">
      <label>Or paste Run URL / ID: <input type="text" id="ciRunId" placeholder="https://github.com/.../runs/12345 or 12345" style="width:340px" oninput="onCiRunIdInput()" onpaste="setTimeout(onCiRunIdInput,0)"></label>
    </div>
    <div class="actions">
      <button class="secondary" onclick="closeCiModal()">Cancel</button>
      <button id="ciDownloadBtn" onclick="downloadCiRun()" disabled>Download & Add</button>
    </div>
  </div>
</div>

<script src="diff.js"></script>
<script src="app.js"></script>
</body>
</html>
