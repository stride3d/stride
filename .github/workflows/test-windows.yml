name: Test Windows

on:
  pull_request:
    paths:
      - '.github/workflows/test-windows.yml'
      - 'build/Stride.Tests.*.slnf'
      - 'deps/**'
      - 'sources/**'
      - '!**/.all-contributorsrc'
      - '!**/.editorconfig'
      - '!**/.gitignore'
      - '!**/*.md'
      - '!crowdin.yml'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      build-type:
        description: Build
        default: Release
        type: choice
        options:
          - Debug
          - Release
      test-category:
        description: Category of tests
        default: Simple
        type: choice
        options:
          - Simple
          - Game
          - VSPackage
  workflow_call:
    inputs:
      build-type:
        default: Release
        type: string
      test-category:
        default: Simple
        type: string

concurrency:
  group: test-windows-${{ github.event.pull_request.number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}-${{ github.event.inputs.test-category || inputs.test-category || 'Simple' }}
  cancel-in-progress: true

jobs:
  #
  # Non-Game tests (Simple, VSPackage)
  #
  Windows-Tests:
    if: ${{ (github.event.inputs.test-category || inputs.test-category || 'Simple') != 'Game' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event.pull_request.draft == false) }}
    name: Test (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}, ${{ github.event.inputs.test-category || inputs.test-category || 'Simple' }})
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: |
          dotnet build build\Stride.Tests.${{ github.event.inputs.test-category || inputs.test-category || 'Simple' }}.slnf `
            -p:StrideNativeBuildMode=Clang `
            -m:1 -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StridePlatforms=Windows `
            -p:StrideGraphicsApis=Direct3D11
      - name: Test
        run: |
          dotnet test build\Stride.Tests.${{ github.event.inputs.test-category || inputs.test-category || 'Simple' }}.slnf `
            --no-build `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}

  #
  # Game tests - API-independent projects (run once)
  #
  Game-Common:
    if: ${{ (github.event.inputs.test-category || inputs.test-category || 'Simple') == 'Game' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event.pull_request.draft == false) }}
    name: Game Common (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: windows-2025-vs2026
    env:
      STRIDE_GRAPHICS_SOFTWARE_RENDERING: "1"
      STRIDE_TESTS_RENDERDOC: "error"
      STRIDE_MAX_PARALLELISM: "8"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Disable WER dialogs
        run: reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f
      - name: Build
        run: |
          dotnet build build\Stride.Tests.Game.slnf `
            -p:StrideNativeBuildMode=Clang `
            -m:1 -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StridePlatforms=Windows `
            -p:StrideGraphicsApis=Direct3D11
      - name: Test
        run: |
          dotnet test build\Stride.Tests.Game.slnf `
            --no-build `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-game-common
          path: tests/local/
          if-no-files-found: ignore

  #
  # Game tests - Graphics API-dependent projects (run per API)
  #
  Game-GraphicsApi:
    if: ${{ (github.event.inputs.test-category || inputs.test-category || 'Simple') == 'Game' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event.pull_request.draft == false) }}
    name: Game ${{ matrix.graphics-api }} (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        graphics-api: [Direct3D11, Direct3D12, Vulkan]
    env:
      STRIDE_GRAPHICS_SOFTWARE_RENDERING: "1"
      STRIDE_TESTS_RENDERDOC: "error"
      STRIDE_MAX_PARALLELISM: "8"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Disable WER dialogs
        run: reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f
      - name: Install Vulkan SDK
        if: matrix.graphics-api == 'Vulkan'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.304.1
          install_runtime: true
          cache: true
          stripdown: true
      - name: Build
        run: |
          dotnet build build\Stride.Tests.Game.GPU.slnf `
            -p:StrideNativeBuildMode=Clang `
            -m:1 -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StridePlatforms=Windows `
            -p:StrideGraphicsApis=${{ matrix.graphics-api }}
      - name: Register SwiftShader ICD
        if: matrix.graphics-api == 'Vulkan'
        shell: pwsh
        run: |
          # Find the ICD JSON in the build output (restored from NuGet package)
          $icdPath = Get-ChildItem -Recurse -Path bin -Filter vk_swiftshader_icd.json -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($icdPath) {
            # Register in registry — the Vulkan loader ignores env vars with elevated permissions
            New-Item -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Force | Out-Null
            New-ItemProperty -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Name $icdPath.FullName -Value 0 -PropertyType DWord -Force | Out-Null
            Write-Host "Registered SwiftShader ICD: $($icdPath.FullName)"
          } else {
            Write-Warning "SwiftShader ICD not found in build output"
          }
      - name: Test
        run: |
          dotnet test build\Stride.Tests.Game.GPU.slnf `
            --no-build `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StrideGraphicsApis=${{ matrix.graphics-api }}
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-game-${{ matrix.graphics-api }}
          path: tests/local/
          if-no-files-found: ignore
