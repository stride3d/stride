name: Test macOS Game (Vulkan)

run-name: ${{ github.event.inputs.commit-sha != '' && format('Test macOS Game (Vulkan) @ {0}', github.event.inputs.commit-sha) || '' }}

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          - Release
      commit-sha:
        description: Commit SHA to test (default = HEAD of selected branch)
        type: string
        default: ''
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
      commit-sha:
        default: ''
        type: string
  repository_dispatch:
    # Fired by chatops bot. Payload: { pr_number, dispatched_by }.
    types: [test-macos-game]


concurrency:
  group: test-macos-game-${{ github.event.pull_request.number || github.event.client_payload.pr_number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  macOS-Tests-Game:
    name: Test Game Vulkan (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: macos-15
    # macOS minutes bill 10× Linux on GitHub-hosted runners; keep timeouts tight.
    timeout-minutes: 20
    env:
      STRIDE_MAX_PARALLELISM: "8"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: true
          ref: ${{ (github.event.inputs.commit-sha != '' && github.event.inputs.commit-sha) || (inputs.commit-sha != '' && inputs.commit-sha) || (github.event.client_payload.pr_number && format('refs/pull/{0}/merge', github.event.client_payload.pr_number)) || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Vulkan validation layer
        # Stride loads the LunarG loader on macOS when present so the validation layer chain works;
        # its DebugReport callback then routes errors+warnings to GraphicsDevice.DebugLog, which
        # GameTestBase converts to Assert.Fail. The layer's JSON ships a bare library_path, so the
        # loader's dlopen needs DYLD_FALLBACK_LIBRARY_PATH to find the dylib in /opt/homebrew/lib.
        # molten-vk supplies the ICD JSON the loader picks up; without it the loader has no driver.
        run: |
          brew install vulkan-validationlayers molten-vk
          echo "VK_LAYER_PATH=$(brew --prefix vulkan-validationlayers)/share/vulkan/explicit_layer.d" >> $GITHUB_ENV
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib" >> $GITHUB_ENV
          echo "MVK_CONFIG_LOG_LEVEL=3" >> $GITHUB_ENV
      - name: Build GPU tests
        run: |
          dotnet build build/Stride.Tests.Game.GPU.slnf \
            -p:StrideTestRuntimeIdentifier=osx-arm64 \
            -nr:false \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=macOS \
            -p:StrideGraphicsApis=Vulkan
      - name: Build non-GPU game tests
        run: |
          dotnet build build/Stride.Tests.Game.Runtime.slnf \
            -p:StrideTestRuntimeIdentifier=osx-arm64 \
            -nr:false \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=macOS \
            -p:StrideGraphicsApis=Vulkan
      - name: Test GPU
        if: success() || failure()
        run: |
          dotnet test build/Stride.Tests.Game.GPU.slnf \
            --no-build \
            --logger:trx --results-directory TestResults \
            --blame-hang-timeout 5m --blame-hang-dump-type full \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StrideGraphicsApis=Vulkan \
            -- RunConfiguration.MaxCpuCount=1
      - name: Test non-GPU
        if: always()
        run: |
          dotnet test build/Stride.Tests.Game.Runtime.slnf \
            --no-build \
            --logger:trx --results-directory TestResults \
            --blame-hang-timeout 5m --blame-hang-dump-type full \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StrideGraphicsApis=Vulkan \
            -- RunConfiguration.MaxCpuCount=1
      - name: Publish Test Report
        if: always()
        uses: phoenix-actions/test-reporting@v15
        with:
          name: 'Test Report: macOS Game (Vulkan)'
          path: TestResults/*.trx
          reporter: dotnet-trx
          output-to: step-summary
          list-tests: 'failed'
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos-vulkan
          path: TestResults/
          if-no-files-found: ignore
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-macos-vulkan
          path: tests/local/
          if-no-files-found: ignore
