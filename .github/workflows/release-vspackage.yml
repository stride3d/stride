name: Release VS Package

on:
  workflow_dispatch:
    inputs:
      sign:
        description: Code sign packages
        default: true
        type: boolean
      deploy:
        description: Deploy to NuGet.org
        default: false
        type: boolean
      upload-binlog:
        description: Capture and upload an MSBuild binlog (diagnostics). Ignored on signed builds — a binlog records env vars/task params and would leak signing secrets.
        default: false
        type: boolean
      version-suffix:
        description: Prerelease suffix for the NuGet package, no leading dash (e.g. "beta1" -> 4.4.0-beta1). Empty = stable. The .vsix manifest version is numeric-only, so it always ships the suffix-less 4.4.0.0.
        default: ''
        type: string

concurrency:
  group: release-vspackage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  Validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy requires signing
        if: ${{ inputs.deploy && !inputs.sign }}
        run: |
          echo "::error::Cannot deploy unsigned packages. Enable 'sign' to deploy."
          exit 1

      - name: Check release permissions
        if: ${{ inputs.sign || inputs.deploy }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ORG=$(echo "${{ github.repository }}" | cut -d/ -f1)
          TEAM="stride-release-managers"
          USER="${{ github.actor }}"
          # A 404 here means either the actor isn't a member OR GH_PAT can't read the team
          # (dead/under-scoped token); the message covers both since the API can't distinguish them.
          if ! gh api "orgs/$ORG/teams/$TEAM/memberships/$USER" --silent 2>/dev/null; then
            echo "::error::Sign/deploy blocked: '$USER' is not a member of $ORG/$TEAM, or GH_PAT cannot read it (dead token / missing Organization Members: Read). Requires stride-release-managers membership."
            exit 1
          fi

  Package:
    name: Package VS Extension
    needs: Validate
    runs-on: windows-2025-vs2026
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build VS Package
        run: |
          # --no-restore: the VSIXPlugin target restores its solution itself.
          dotnet build build\Stride.build `
            -t:VSIXPlugin `
            --no-restore `
            ${{ inputs.upload-binlog && !inputs.sign && '-bl' || '' }} -m -nr:false `
            -p:StrideSign=${{ inputs.sign }} `
            -p:VersionSuffix=${{ inputs.version-suffix }}
        env:
          StrideSignTenantId: ${{ secrets.STRIDE_SIGN_TENANT_ID }}
          StrideSignClientId: ${{ secrets.STRIDE_SIGN_CLIENT_ID }}
          StrideSignClientSecret: ${{ secrets.STRIDE_SIGN_CLIENT_SECRET }}
          StrideSignKeyVaultCertificate: ${{ secrets.STRIDE_SIGN_KEYVAULT_CERTIFICATE }}
          StrideSignKeyVaultName: ${{ secrets.STRIDE_SIGN_KEYVAULT_NAME }}

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem -Path bin/vsix -Filter "*.nupkg" | Select-Object -First 1
          if (-not ($nupkg -and $nupkg.BaseName -match '\.(\d+\.\d+\.\d+.*)$')) {
            echo "::error::Could not determine a version from the VS package nupkg name"
            exit 1
          }
          $version = $Matches[1]
          if ($version -notmatch '^\d+\.\d+\.\d+(-(alpha|beta|rc|preview)\d+)?$') {
            echo "::error::Version '$version' is not an allowed release version. Use X.Y.Z or X.Y.Z-(alpha|beta|rc|preview)<N> (e.g. 4.4.0, 4.4.0-beta1)"
            exit 1
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stride-vsix-${{ steps.version.outputs.version }}
          path: bin/vsix/*.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.upload-binlog && !inputs.sign }}
        with:
          name: build-log
          path: msbuild.binlog
          if-no-files-found: ignore

  Deploy:
    name: Deploy VS Package
    if: ${{ inputs.deploy && inputs.sign }}
    needs: Package
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4  # full history + tags for the vspackage-scoped changelog and tagging
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT }}  # push the vspackage/<version> tag

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          name: stride-vsix-${{ needs.Package.outputs.version }}
          path: bin/vsix

      - name: Push to NuGet
        shell: pwsh
        run: |
          Get-ChildItem -Path bin/vsix -Filter "*.nupkg" | ForEach-Object {
            echo "Pushing $($_.Name)..."
            dotnet nuget push $_.FullName --api-key $env:STRIDE_NUGET_API_KEY --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }
        env:
          STRIDE_NUGET_API_KEY: ${{ secrets.STRIDE_NUGET_API_KEY }}

      - name: Tag release
        run: |
          TAG="vspackage/${{ needs.Package.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="vspackage/${{ needs.Package.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            # The VS package is a separate product from the engine. Build its changelog from the
            # previous vspackage/* tag and scope it to the VS package sources, so engine/CLI commits
            # don't leak in (and the products' changelogs don't interleave, as GitHub's auto notes would).
            PREV=$(git describe --tags --abbrev=0 --match 'vspackage/*' "$TAG^" 2>/dev/null || true)
            RANGE="$TAG"
            [ -n "$PREV" ] && RANGE="$PREV..$TAG"
            NOTES=$(git log --no-merges --pretty='- %s (%h)' "$RANGE" -- sources/tools/Stride.VisualStudio.*)
            [ -z "$NOTES" ] && NOTES="_No VS package-specific changes since the previous release._"
            {
              echo "## What's changed in the Stride Visual Studio package"
              echo ""
              echo "$NOTES"
              if [ -n "$PREV" ]; then
                echo ""
                echo "**Full VS package changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/$PREV...$TAG"
              fi
            } > vspackage-notes.md
            # Separate product: never the repository's "Latest" release (that's the engine).
            gh release create "$TAG" \
              --title "Stride VS Package ${{ needs.Package.outputs.version }}" \
              --notes-file vspackage-notes.md \
              --latest=false \
              bin/vsix/*.nupkg
          fi

      - name: AI release notes
        continue-on-error: true  # best-effort; keeps the scoped commit-list body on failure
        uses: ./.github/actions/ai-release-notes
        with:
          tag: vspackage/${{ needs.Package.outputs.version }}
          tag-match: 'vspackage/*'
          product: the Stride Visual Studio package
          scope: sources/tools/Stride.VisualStudio.*
          apply: true
          format: highlights
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GH_PAT }}
