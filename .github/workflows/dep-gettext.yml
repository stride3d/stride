name: "Dep: Build & Deploy Gettext.NET"

# Builds the Stride.GNU.Gettext / Stride.GNU.Getopt runtime libraries from stride3d/gettextnet
# and publishes them to NuGet.org, mirroring the other dep-*.yml workflows. The msgfmt build
# tool is shipped to Stride as a committed binary in deps/Gettext.Net, not via NuGet.

on:
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version (leave empty to use the csproj version)
        required: false
      branch:
        description: gettextnet branch to build
        default: master
        required: false

jobs:
  pack:
    name: Pack Stride.GNU.Gettext / Getopt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gettext.NET
        uses: actions/checkout@v4
        with:
          repository: stride3d/gettextnet
          ref: ${{ github.event.inputs.branch || 'master' }}
          path: gettextnet-src

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        shell: pwsh
        run: |
          $versionArg = if ("${{ github.event.inputs.version }}") { "-p:Version=${{ github.event.inputs.version }}" } else { "" }
          dotnet pack gettextnet-src/GNU.Getopt/GNU.Getopt.csproj -c Release -o nupkg $versionArg
          dotnet pack gettextnet-src/GNU.Gettext/GNU.Gettext/GNU.Gettext.csproj -c Release -o nupkg $versionArg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stride.GNU.Gettext.nupkg
          path: nupkg/*.nupkg

  publish:
    name: Sign & Publish to NuGet.org
    needs: pack
    # Only the canonical repo holds the production environment, signing and NuGet secrets;
    # forks validate the pack job above but never attempt to publish.
    if: github.repository == 'stride3d/stride'
    # The sign tool is Windows-only (P/Invokes kernel32), so signing runs on Windows even
    # though the managed pack above runs on Linux.
    runs-on: windows-2025-vs2026
    environment: production
    steps:
      - name: Install signing tool
        run: dotnet tool install sign --tool-path ./sign-tool --version 0.9.0-beta.23127.3

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Stride.GNU.Gettext.nupkg

      - name: Sign NuGet package
        shell: pwsh
        run: |
          ./sign-tool/sign code azure-key-vault *.nupkg `
            --description "Stride" `
            --description-url "https://stride3d.net" `
            --publisher-name "Stride" `
            --azure-key-vault-tenant-id "${{ secrets.STRIDE_SIGN_TENANT_ID }}" `
            --azure-key-vault-client-id "${{ secrets.STRIDE_SIGN_CLIENT_ID }}" `
            --azure-key-vault-client-secret "${{ secrets.STRIDE_SIGN_CLIENT_SECRET }}" `
            --azure-key-vault-certificate "${{ secrets.STRIDE_SIGN_KEYVAULT_CERTIFICATE }}" `
            --azure-key-vault-url "https://${{ secrets.STRIDE_SIGN_KEYVAULT_NAME }}.vault.azure.net/" `
            -v Information

      - name: Publish
        run: |
          dotnet nuget push *.nupkg --api-key "${{ secrets.STRIDE_NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
