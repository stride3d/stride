name: PR Label Suites

# Opt-in CI suites a collaborator arms by adding a `ci-<suite>` label to a PR.
#
# - `labeled` arms it (runs now); `synchronize` reruns armed suites on each push; `unlabeled`
#   clears a previously-red gate (re-runs with the suite skipped → green).
# - Runs through pull_request, so it uses the PR's own workflow YAML; adding a label requires
#   write access, so the label itself is the authorization.
# - Each suite is a separate, non-required check; this workflow's own `label-gate` aggregates them.
#   It never recomputes main.yml's Gate, so a forced run can't override main's required result.
#
# Only list suites here that main.yml does NOT already run on a path filter, OR gate them on the
# shared `changes` filter (see `ios`/`android`) so a forced run yields to main's run whenever main
# will already run it — avoiding both a double-run and a gap.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-label-suites-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Shared path-filter, consulted by suites that overlap main.yml's auto-run set (e.g. ios).
  changes:
    uses: ./.github/workflows/changes.yml

  # End-user packaging/screenshot suite — main.yml never auto-runs it, so no overlap guard needed.
  enduser:
    needs: changes
    if: contains(github.event.pull_request.labels.*.name, 'ci-enduser')
    uses: ./.github/workflows/test-enduser.yml
    secrets: inherit
    with:
      build-type: Debug

  # GameStudio editor screenshot suite — main.yml never auto-runs it, so no overlap guard needed.
  # Keyless on forks: it captures + defers borderline frames, which pr-screenshot-vision-gate
  # re-judges with the key.
  editor:
    needs: changes
    if: contains(github.event.pull_request.labels.*.name, 'ci-editor')
    uses: ./.github/workflows/test-windows-editor.yml
    secrets: inherit
    with:
      build-type: Debug

  # iOS auto-runs in main.yml on the narrow ios-tests filter. Run it here only when main.yml won't:
  # on a draft that ci-run-on-draft doesn't punch through, or when the path filter didn't match.
  # Net: ci-ios runs iOS exactly once per push — no gap, no double-run.
  ios:
    needs: changes
    if: >
      contains(github.event.pull_request.labels.*.name, 'ci-ios')
      && ((github.event.pull_request.draft == true && !contains(github.event.pull_request.labels.*.name, 'ci-run-on-draft'))
          || needs.changes.outputs.ios-tests != 'true')
    uses: ./.github/workflows/test-ios-game.yml
    secrets: inherit
    with:
      build-type: Debug

  # Android: identical pattern to iOS, gated on the android path filter.
  android:
    needs: changes
    if: >
      contains(github.event.pull_request.labels.*.name, 'ci-android')
      && ((github.event.pull_request.draft == true && !contains(github.event.pull_request.labels.*.name, 'ci-run-on-draft'))
          || needs.changes.outputs.android != 'true')
    uses: ./.github/workflows/test-android-game.yml
    secrets: inherit
    with:
      build-type: Debug

  # Aggregate result for the forced suites. always() so a cancellation reports red, not skipped.
  # Skipped suites (label absent) are fine; only failure/cancellation fails the gate. Mark this
  # "Label Suites Gate" check required in branch protection to make forced suites blocking.
  label-gate:
    needs: [changes, enduser, editor, ios, android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any forced suite failed or was cancelled
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.value.result)\t\(.key)"'
          test "$(echo "$NEEDS" | jq '[.[] | select(.result=="failure" or .result=="cancelled")] | length')" -eq 0
