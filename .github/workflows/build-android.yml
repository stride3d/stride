name: Build Android Runtime

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          - Release
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
  repository_dispatch:
    # Fired by chatops bot. Payload: { pr_number, dispatched_by }.
    types: [build-android]

concurrency:
  group: build-android-${{ github.event.pull_request.number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  #
  # Build Stride Runtime for Android
  #
  Android-Runtime:
    name: Build (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: windows-2025-vs2026
    steps:
      # Bootstrap .github so the local composite action below is resolvable pre-checkout.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/stride-checkout
        with:
          ref: ${{ github.event.client_payload.pr_number && format('refs/pull/{0}/merge', github.event.client_payload.pr_number) || github.ref }}
          exclude: samples
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Android Workload
        run: dotnet workload install android
      - name: Setup Android
        # NDK: not installed/pinned — the runner image preinstalls NDKs and each project's
        # Android workload targets resolve _AndroidNdkDirectory locally (Stride.Build.Sdk
        # strips it from ProjectReference dispatches so the value never fragments build
        # cache keys; Stride.Native.targets enforces a minimum version at compile time).
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true
          packages: tools platform-tools
      - name: Build
        run: |
          dotnet build build\Stride.Android.slnf `
            -nr:false `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StridePlatforms=Android `
            -p:StrideSkipUnitTests=true `
            -p:StrideSkipAutoPack=true
