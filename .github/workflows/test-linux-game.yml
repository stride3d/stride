name: Test Linux Game (Vulkan)

run-name: ${{ github.event.inputs.commit-sha != '' && format('Test Linux Game (Vulkan) @ {0}', github.event.inputs.commit-sha) || '' }}

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          - Release
      commit-sha:
        description: Commit SHA to test (default = HEAD of selected branch)
        type: string
        default: ''
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
      commit-sha:
        default: ''
        type: string
  repository_dispatch:
    # Fired by chatops bot. Payload: { pr_number, dispatched_by }.
    types: [test-linux-game]


concurrency:
  group: test-linux-game-${{ github.event.pull_request.number || github.event.client_payload.pr_number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  Linux-Tests-Game:
    name: Test Game Vulkan (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      STRIDE_GRAPHICS_SOFTWARE_RENDERING: "1"
      STRIDE_MAX_PARALLELISM: "8"
      # Stride.NuGetResolver re-verifies packages per synthetic project (unlike dotnet
      # restore which trusts cached results), tripping on legacy 4.3.0/4.7.0 BCL packages
      # whose timestamping CAs have expired. Disable verification for this CI job.
      DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: true
          ref: ${{ (github.event.inputs.commit-sha != '' && github.event.inputs.commit-sha) || (inputs.commit-sha != '' && inputs.commit-sha) || (github.event.client_payload.pr_number && format('refs/pull/{0}/merge', github.event.client_payload.pr_number)) || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenal-dev libvulkan1 xvfb lld vulkan-validationlayers libva2 libva-drm2 libva-x11-2
      - name: Start virtual display
        run: |
          # Lavapipe's x11 WSI needs a display server to expose VK_KHR_swapchain,
          # which Stride's GraphicsDevice requires even for pure offscreen rendering.
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Register Lavapipe ICD
        run: |
          # CompilerApp needs a Vulkan device at build time (Skybox asset compilation),
          # and the runtime tests also resolve through this ICD. Restore first so the
          # Stride.Dependencies.Lavapipe package is in the user NuGet cache, then point
          # the Vulkan loader at the linux-x64 Lavapipe .so shipped inside that package.
          dotnet restore build/Stride.Tests.Game.GPU.slnf \
            -p:StridePlatforms=Linux \
            -p:StrideGraphicsApis=Vulkan
          LIB=$(find ~/.nuget/packages/stride.dependencies.lavapipe -path "*/runtimes/linux-x64/native/libvulkan_lvp.so" | head -1)
          if [ -n "$LIB" ]; then
            LIB_ABS=$(readlink -f "$LIB")
            ICD_JSON="$PWD/lvp_icd.json"
            echo "{\"file_format_version\":\"1.0.0\",\"ICD\":{\"library_path\":\"$LIB_ABS\",\"api_version\":\"1.3.0\"}}" > "$ICD_JSON"
            echo "VK_DRIVER_FILES=$ICD_JSON" >> $GITHUB_ENV
            echo "Registered Lavapipe ICD: $ICD_JSON -> $LIB_ABS"
          else
            echo "::error::Lavapipe libvulkan_lvp.so not found in NuGet cache"
            exit 1
          fi
      - name: Build GPU tests
        run: |
          dotnet build build/Stride.Tests.Game.GPU.slnf \
            -p:StrideTestRuntimeIdentifier=linux-x64 \
            -nr:false \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=Linux \
            -p:StrideGraphicsApis=Vulkan
      - name: Build non-GPU game tests
        run: |
          dotnet build build/Stride.Tests.Game.Runtime.slnf \
            -p:StrideTestRuntimeIdentifier=linux-x64 \
            -nr:false \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=Linux \
            -p:StrideGraphicsApis=Vulkan
      - name: Test GPU
        if: success() || failure()
        run: |
          dotnet test build/Stride.Tests.Game.GPU.slnf \
            --no-build \
            --logger:trx --results-directory TestResults \
            --blame-hang-timeout 5m --blame-hang-dump-type full \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StrideGraphicsApis=Vulkan \
            -- RunConfiguration.MaxCpuCount=1
      - name: Test non-GPU
        if: always()
        run: |
          dotnet test build/Stride.Tests.Game.Runtime.slnf \
            --no-build \
            --logger:trx --results-directory TestResults \
            --blame-hang-timeout 5m --blame-hang-dump-type full \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StrideGraphicsApis=Vulkan \
            -- RunConfiguration.MaxCpuCount=1
      - name: Publish Test Report
        if: always()
        uses: phoenix-actions/test-reporting@v15
        with:
          name: 'Test Report: Linux Game (Vulkan)'
          path: TestResults/*.trx
          reporter: dotnet-trx
          output-to: step-summary
          list-tests: 'failed'
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-vulkan
          path: TestResults/
          if-no-files-found: ignore
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-linux-vulkan
          path: tests/local/
          if-no-files-found: ignore
