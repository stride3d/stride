name: Test Linux Game (Vulkan)

run-name: >-
  ${{ github.event.inputs.commit-sha != '' && format('Test Linux Game (Vulkan) @ {0}', github.event.inputs.commit-sha) || '' }}

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          - Release
      test-filter:
        description: 'dotnet test --filter expression (blank = all tests)'
        type: string
        default: ''
      repeat:
        description: 'Rerun the filtered GPU test set up to N times, stop on first failure (flake hunting). 1 = single run (default).'
        type: number
        default: 1
      project:
        description: 'Single test .csproj path to build/test (blank = whole GPU + Runtime solutions)'
        type: string
        default: ''
      commit-sha:
        description: Commit SHA to test (default = HEAD of selected branch)
        type: string
        default: ''
      upload-binlog:
        description: Capture and upload build binlog (off by default; adds some I/O overhead)
        default: false
        type: boolean
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
      test-filter:
        default: ''
        type: string
      repeat:
        default: 1
        type: number
      project:
        default: ''
        type: string
      commit-sha:
        default: ''
        type: string
      # Internal (callers only, e.g. test-gold-gen): tolerate test failures so generating new gold
      # doesn't fail the run. Build failures still fail. Not exposed in the dispatch UI.
      tolerate-test-failures:
        default: false
        type: boolean
      upload-binlog:
        default: false
        type: boolean

concurrency:
  group: test-linux-game-${{ github.event.pull_request.number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  Linux-Tests-Game:
    name: Linux (Vulkan, ${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      STRIDE_GRAPHICS_SOFTWARE_RENDERING: "1"
      STRIDE_MAX_PARALLELISM: "8"
      # Stride.NuGetResolver re-verifies packages per synthetic project (unlike dotnet
      # restore which trusts cached results), tripping on legacy 4.3.0/4.7.0 BCL packages
      # whose timestamping CAs have expired. Disable verification for this CI job.
      DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
    steps:
      # Bootstrap .github so the local composite action below is resolvable pre-checkout.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/stride-checkout
        with:
          ref: ${{ (github.event.inputs.commit-sha != '' && github.event.inputs.commit-sha) || (inputs.commit-sha != '' && inputs.commit-sha) || github.ref }}
          exclude: samples
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenal-dev libvulkan1 xvfb lld vulkan-validationlayers libva2 libva-drm2 libva-x11-2
      - name: Start virtual display
        run: |
          # Lavapipe's x11 WSI needs a display server to expose VK_KHR_swapchain,
          # which Stride's GraphicsDevice requires even for pure offscreen rendering.
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Register Lavapipe ICD
        run: |
          # CompilerApp needs a Vulkan device at build time (Skybox asset compilation),
          # and the runtime tests also resolve through this ICD. Restore first so the
          # Stride.Dependencies.Lavapipe package is in the user NuGet cache, then point
          # the Vulkan loader at the linux-x64 Lavapipe .so shipped inside that package.
          dotnet restore build/Stride.Tests.Game.GPU.slnf \
            -p:StridePlatforms=Linux \
            -p:StrideGraphicsApis=Vulkan
          LIB=$(find ~/.nuget/packages/stride.dependencies.lavapipe -path "*/runtimes/linux-x64/native/libvulkan_lvp.so" | head -1)
          if [ -n "$LIB" ]; then
            LIB_ABS=$(readlink -f "$LIB")
            ICD_JSON="$PWD/lvp_icd.json"
            echo "{\"file_format_version\":\"1.0.0\",\"ICD\":{\"library_path\":\"$LIB_ABS\",\"api_version\":\"1.3.0\"}}" > "$ICD_JSON"
            echo "VK_DRIVER_FILES=$ICD_JSON" >> $GITHUB_ENV
            echo "Registered Lavapipe ICD: $ICD_JSON -> $LIB_ABS"
          else
            echo "::error::Lavapipe libvulkan_lvp.so not found in NuGet cache"
            exit 1
          fi
      - name: Resolve build/test target
        run: |
          # `project` (a single .csproj) narrows the build+test to one suite; blank = whole GPU + Runtime solutions.
          PROJ="${{ github.event.inputs.project || inputs.project }}"
          echo "STRIDE_TEST_TARGET=${PROJ:-build/Stride.Tests.Game.GPU.slnf}" >> "$GITHUB_ENV"
          echo "STRIDE_TEST_FILTER=${{ github.event.inputs.test-filter || inputs.test-filter }}" >> "$GITHUB_ENV"
      - name: Build GPU tests
        run: |
          dotnet build "$STRIDE_TEST_TARGET" \
            -p:StrideTestRuntimeIdentifier=linux-x64 \
            -p:StrideSkipAutoPack=true \
            -nr:false \
            ${{ inputs.upload-binlog && '-bl:build-gpu.binlog' || '' }} \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=Linux \
            -p:StrideGraphicsApis=Vulkan
      - name: Build non-GPU game tests
        if: ${{ (github.event.inputs.project || inputs.project) == '' }}
        run: |
          dotnet build build/Stride.Tests.Game.Runtime.slnf \
            -p:StrideTestRuntimeIdentifier=linux-x64 \
            -p:StrideSkipAutoPack=true \
            -nr:false \
            ${{ inputs.upload-binlog && '-bl:build-runtime.binlog' || '' }} \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=Linux \
            -p:StrideGraphicsApis=Vulkan
      - name: Upload build binlogs
        # failure() so we still get the binlog when Build dies (most useful case)
        if: failure() || inputs.upload-binlog
        uses: actions/upload-artifact@v4
        with:
          name: build-binlog-linux-game
          path: build-*.binlog
          if-no-files-found: ignore
      - name: Test GPU
        if: success() || failure()
        continue-on-error: ${{ inputs.tolerate-test-failures == true }}
        run: |
          REPEAT="${{ github.event.inputs.repeat || inputs.repeat || '1' }}"
          FILTER_ARG=()
          if [ -n "$STRIDE_TEST_FILTER" ]; then FILTER_ARG=(--filter "$STRIDE_TEST_FILTER"); fi
          for i in $(seq 1 "$REPEAT"); do
            echo "=== Test run $i / $REPEAT ==="
            dotnet test "$STRIDE_TEST_TARGET" \
              --no-build \
              --logger:"trx;LogFilePrefix=run-$i" --results-directory TestResults \
              --blame-hang-timeout 5m --blame-hang-dump-type full \
              -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
              -p:StrideGraphicsApis=Vulkan \
              "${FILTER_ARG[@]}" \
              -- RunConfiguration.MaxCpuCount=1 || { ec=$?; echo "Run $i failed (exit $ec); stopping."; exit $ec; }
          done
      - name: Test non-GPU
        if: ${{ !cancelled() && (github.event.inputs.project || inputs.project) == '' }}
        continue-on-error: ${{ inputs.tolerate-test-failures == true }}
        run: |
          dotnet test build/Stride.Tests.Game.Runtime.slnf \
            --no-build \
            --logger:trx --results-directory TestResults \
            --blame-hang-timeout 5m --blame-hang-dump-type full \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StrideGraphicsApis=Vulkan \
            -- RunConfiguration.MaxCpuCount=1
      - name: Publish Test Report
        if: always()
        uses: phoenix-actions/test-reporting@v15
        with:
          name: 'Test Report: Linux Game (Vulkan)'
          path: TestResults/*.trx
          reporter: dotnet-trx
          output-to: step-summary
          list-tests: 'failed'
          # Tolerated (gold-gen) test failures shouldn't red the run via the reporter; the Build
          # and Test steps still fail normally. Defaults to true for direct / PR-gate runs.
          fail-on-error: ${{ inputs.tolerate-test-failures != true }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-vulkan
          path: TestResults/
          if-no-files-found: ignore
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-linux-vulkan
          path: tests/local/
          if-no-files-found: ignore
