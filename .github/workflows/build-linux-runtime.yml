name: Build Linux Runtime

run-name: >-
  ${{ github.event.client_payload.pr_number
      && format('Build Linux Runtime — PR #{0} @ {1}', github.event.client_payload.pr_number, github.event.client_payload.pr_head_sha)
      || (github.event.inputs.commit-sha != '' && format('Build Linux Runtime @ {0}', github.event.inputs.commit-sha))
      || '' }}

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          - Release
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
  repository_dispatch:
    # Fired by chatops bot. Payload: { pr_number, dispatched_by }.
    types: [build-linux-runtime]

concurrency:
  group: build-linux-runtime-${{ github.event.pull_request.number || github.event.client_payload.pr_number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  #
  # Build Stride Runtime for Linux
  #
  Linux-Runtime:
    name: Build (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: true
          ref: ${{ github.event.client_payload.pr_number && format('refs/pull/{0}/merge', github.event.client_payload.pr_number) || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dependencies
        run: |
          sudo apt-get install clang lld
      - name: Build
        run: |
          dotnet build build/Stride.Runtime.slnf \
            -nr:false \
            -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=Linux \
            -p:StrideSkipUnitTests=true \
            -p:StrideSkipAutoPack=true
