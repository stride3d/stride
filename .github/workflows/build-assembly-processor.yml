name: Build Assembly Processor

run-name: >-
  ${{ github.event.client_payload.pr_number
      && format('Build Assembly Processor — PR #{0} @ {1}', github.event.client_payload.pr_number, github.event.client_payload.pr_head_sha)
      || (github.event.inputs.commit-sha != '' && format('Build Assembly Processor @ {0}', github.event.inputs.commit-sha))
      || '' }}

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          - Release
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
  repository_dispatch:
    # Fired by chatops bot. Payload: { pr_number, dispatched_by }.
    types: [build-assembly-processor]

concurrency:
  group: build-assembly-processor-${{ github.event.pull_request.number || github.event.client_payload.pr_number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  #
  # Build Assembly Processor
  #
  Assembly-Processor:
    name: Build (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: windows-2025-vs2026
    steps:
      # Bootstrap .github so the local composite action below is resolvable pre-checkout.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/stride-checkout
        with:
          ref: ${{ github.event.client_payload.pr_number && format('refs/pull/{0}/merge', github.event.client_payload.pr_number) || github.ref }}
          exclude: samples
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: |
          dotnet build build\Stride.AssemblyProcessor.sln `
            -restore -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StrideSkipUnitTests=true `
            -p:StrideSkipAutoPack=true
