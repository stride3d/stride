name: Release Launcher

on:
  workflow_dispatch:
    inputs:
      sign:
        description: Code sign packages
        default: true
        type: boolean
      deploy:
        description: Deploy to NuGet.org
        default: false
        type: boolean
      upload-binlog:
        description: Capture and upload an MSBuild binlog (diagnostics). Ignored on signed builds — a binlog records env vars/task params and would leak signing secrets.
        default: false
        type: boolean

concurrency:
  group: release-launcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  #
  # Validate inputs and permissions
  #
  Validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy requires signing
        if: ${{ inputs.deploy && !inputs.sign }}
        run: |
          echo "::error::Cannot deploy unsigned packages. Enable 'sign' to deploy."
          exit 1

      - name: Check release permissions
        if: ${{ inputs.sign || inputs.deploy }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ORG=$(echo "${{ github.repository }}" | cut -d/ -f1)
          TEAM="stride-release-managers"
          USER="${{ github.actor }}"
          # A 404 here means either the actor isn't a member OR GH_PAT can't read the team
          # (dead/under-scoped token); the message covers both since the API can't distinguish them.
          if ! gh api "orgs/$ORG/teams/$TEAM/memberships/$USER" --silent 2>/dev/null; then
            echo "::error::Sign/deploy blocked: '$USER' is not a member of $ORG/$TEAM, or GH_PAT cannot read it (dead token / missing Organization Members: Read). Requires stride-release-managers membership."
            exit 1
          fi

  #
  # Build, package and optionally deploy the launcher
  #
  Package:
    name: Package Launcher
    needs: Validate
    runs-on: windows-latest
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: microsoft/setup-msbuild@v2

      - name: Install Advanced Installer
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.advancedinstaller.com/downloads/22.0/advinst.msi" -OutFile advinst.msi
          msiexec /i advinst.msi /qn ADDLOCAL=ALL | Out-Null
          if ("${{ secrets.ADVINST_LICENSE_KEY }}" -ne "") {
            & "${env:ProgramFiles(x86)}\Caphyon\Advanced Installer 22.0\bin\x86\AdvancedInstaller.com" /register "${{ secrets.ADVINST_LICENSE_KEY }}"
          }

      - name: Build and package launcher
        shell: pwsh
        run: |
          msbuild build\Stride.build `
            /t:FullBuildLauncher `
            ${{ inputs.upload-binlog && !inputs.sign && '/bl' || '' }} /m /nr:false `
            /p:StrideSign=${{ inputs.sign }}
        env:
          StrideSignTenantId: ${{ secrets.STRIDE_SIGN_TENANT_ID }}
          StrideSignClientId: ${{ secrets.STRIDE_SIGN_CLIENT_ID }}
          StrideSignClientSecret: ${{ secrets.STRIDE_SIGN_CLIENT_SECRET }}
          StrideSignKeyVaultCertificate: ${{ secrets.STRIDE_SIGN_KEYVAULT_CERTIFICATE }}
          StrideSignKeyVaultName: ${{ secrets.STRIDE_SIGN_KEYVAULT_NAME }}

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem -Path bin/launcher -Filter "*.nupkg" | Select-Object -First 1
          if ($nupkg -and $nupkg.BaseName -match '\.(\d+\.\d+\.\d+.*)$') {
            echo "version=$($Matches[1])" >> $env:GITHUB_OUTPUT
          }

      - name: Upload launcher artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stride-launcher-${{ steps.version.outputs.version }}
          path: |
            bin/launcher/*.nupkg
            bin/launcher/*.exe
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.upload-binlog && !inputs.sign }}
        with:
          name: build-log
          path: msbuild.binlog
          if-no-files-found: ignore

  Deploy:
    name: Deploy Launcher
    if: ${{ inputs.deploy && inputs.sign }}
    needs: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # full history + tags for the launcher-scoped changelog
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download launcher artifacts
        uses: actions/download-artifact@v4
        with:
          name: stride-launcher-${{ needs.Package.outputs.version }}
          path: bin/launcher

      - name: Push to NuGet
        shell: pwsh
        run: |
          Get-ChildItem -Path bin/launcher -Filter "*.nupkg" | ForEach-Object {
            echo "Pushing $($_.Name)..."
            dotnet nuget push $_.FullName --api-key $env:STRIDE_NUGET_API_KEY --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }
        env:
          STRIDE_NUGET_API_KEY: ${{ secrets.STRIDE_NUGET_API_KEY }}

      - name: Build release notes
        if: ${{ needs.Package.outputs.version != '' }}
        run: |
          TAG="launcher/${{ needs.Package.outputs.version }}"
          # The launcher is a separate product from the engine. Build its changelog from the previous
          # launcher/* tag and scope it to the launcher sources, so engine/CLI commits don't leak in
          # (and the products' changelogs don't interleave, as GitHub's auto notes would do). The
          # launcher/<version> tag is created by the release step below, so pick the previous tag from
          # the existing launcher/* tags rather than relative to it.
          PREV=$(git tag --list 'launcher/*' --sort=-creatordate | grep -vxF "$TAG" | head -n1 || true)
          RANGE="HEAD"
          [ -n "$PREV" ] && RANGE="$PREV..HEAD"
          NOTES=$(git log --no-merges --pretty='- %s (%h)' "$RANGE" -- sources/launcher/Stride.Launcher)
          [ -z "$NOTES" ] && NOTES="_No launcher-specific changes since the previous release._"
          {
            echo "## What's changed in the Stride Launcher"
            echo ""
            echo "$NOTES"
            if [ -n "$PREV" ]; then
              echo ""
              echo "**Full launcher changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/$PREV...$TAG"
            fi
          } > launcher-notes.md

      - name: Create GitHub Release
        if: ${{ needs.Package.outputs.version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: launcher/${{ needs.Package.outputs.version }}
          name: Stride Launcher ${{ needs.Package.outputs.version }}
          files: bin/launcher/*.exe
          make_latest: false  # separate product: never the repo's "Latest" release (that's the engine)
          body_path: launcher-notes.md

      - name: AI release notes
        if: ${{ needs.Package.outputs.version != '' }}
        continue-on-error: true  # best-effort; keeps the scoped commit-list body on failure
        uses: ./.github/actions/ai-release-notes
        with:
          tag: launcher/${{ needs.Package.outputs.version }}
          tag-match: 'launcher/*'
          product: the Stride Launcher
          scope: sources/launcher/Stride.Launcher
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GH_PAT }}
