name: Test Gold Generation

# Fast, on-demand gold-image generation across platforms. Thin orchestrator: it calls the
# existing reusable test-*-game.yml workflows (the canonical PR gate) with two extra knobs —
# `test-filter` (run one test) and `project` (build/test one suite) — then gathers every
# platform's rendered output into a single downloadable zip, and optionally promotes it to gold.
#
# Why a separate workflow: dispatched directly it skips main.yml's runtime-build gate, and
# `project`/`test-filter` cut the build+run down to the one suite/test you're adding gold for.
#
# Generating brand-new gold makes the platform jobs go RED ("reference image missing") — that's
# expected. The `gather` job runs regardless: download its `gold-images` artifact (or point
# CompareGold at the run) to review.
#
# When `update-gold` is not none, the `promote` job runs CompareGold's headless promote
# — the SAME per-pixel + thresholds.jsonc compare the tests and the CompareGold UI use, so a render
# within tolerance of a higher-priority API's gold is covered by fallback rather than committed as its
# own near-identical gold. It then lands per that mode: `auto` commits new gold but opens a PR when
# review is warranted; `commit`/`amend` push straight to the dispatched branch and FAIL (red run) if
# it's protected/detached; `pr` always opens a PR. A failed dispatch build also reds the run.

run-name: >-
  ${{ inputs.commit-sha != '' && format('Gold Gen @ {0}', inputs.commit-sha) || '' }}

on:
  workflow_dispatch:
    inputs:
      windows:
        description: Windows (Direct3D11 / Direct3D12 / Vulkan)
        type: boolean
        default: true
      linux:
        description: Linux (Vulkan / Lavapipe)
        type: boolean
        default: true
      macos:
        description: macOS (Vulkan / MoltenVK)
        type: boolean
        default: true
      android:
        description: Android (Vulkan / emulator)
        type: boolean
        default: true
      ios:
        description: iOS (Vulkan / MoltenVK / simulator)
        type: boolean
        default: true
      graphics-api:
        description: Windows graphics API (blank = all three)
        type: choice
        default: ''
        options:
          - ''
          - Direct3D11
          - Direct3D12
          - Vulkan
      test-filter:
        description: 'dotnet test --filter / vstest filter (blank = all tests)'
        type: string
        default: ''
      project:
        description: 'Single test .csproj to build/test (blank = whole GPU solution)'
        type: string
        default: ''
      build-type:
        description: Build Configuration
        type: choice
        default: Debug
        options:
          - Debug
          - Release
      commit-sha:
        description: Commit SHA to test (default = HEAD of selected branch)
        type: string
        default: ''
      update-gold:
        description: 'How to land promoted gold. none=artifact only; auto=commit new gold but open a PR if it changes existing gold (or the branch is protected/detached); commit=push straight to the branch; amend=fold into the last commit; pr=always a PR. commit/amend fail the run if the branch is protected or detached — use auto/pr there.'
        type: choice
        default: none
        options:
          - none
          - auto
          - commit
          - amend
          - pr
      dedup-gold:
        description: Also remove redundant existing gold (dedup) before committing
        type: boolean
        default: false

permissions:
  checks: write
  contents: read

concurrency:
  group: test-gold-gen-${{ github.ref }}-${{ inputs.build-type }}
  cancel-in-progress: true

jobs:
  # Surfaces what happens to this run's gold up-front (no `needs:`, so it shows within seconds of
  # dispatch) via the run summary + a notice annotation: whether the promote job lands it
  # automatically (per update-gold), plus the local promote/review command either way.
  info:
    if: ${{ inputs.windows || inputs.linux || inputs.macos || inputs.android || inputs.ios }}
    runs-on: ubuntu-latest
    steps:
      - name: Show gold landing info
        run: |
          MODE='${{ inputs.update-gold }}'
          CMD="dotnet run --project build/tools/Stride.CompareGold -- promote --source ${{ github.repository }}:${{ github.run_id }}"

          # What the promote job will do with this run's gold (SUMMARY), and how to preview it
          # locally first (PROMPT). The mode is shown on its own line so it reads at a glance.
          case "$MODE" in
            none)   SUMMARY="artifact only — **nothing is committed**." ; PROMPT="Promote it yourself:" ;;
            auto)   SUMMARY="landed **automatically** — new gold is committed, any *changed* gold opens a PR for review." ; PROMPT="Preview it first, or promote it yourself instead:" ;;
            commit) SUMMARY="**committed automatically** straight to this branch." ; PROMPT="Preview it first:" ;;
            amend)  SUMMARY="**folded into the last commit automatically**." ; PROMPT="Preview it first:" ;;
            pr)     SUMMARY="a **PR is opened automatically**." ; PROMPT="Preview it first:" ;;
          esac

          echo "::notice title=Gold landing (update-gold=$MODE)::$CMD --dry-run"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Gold for this run

          **Mode: \`$MODE\`** — $SUMMARY

          $PROMPT

          \`\`\`bash
          $CMD --dry-run
          \`\`\`

          Drop \`--dry-run\` to apply, then commit. \`dedup\` (same \`--source\`) removes redundant gold.
          Or add run \`${{ github.run_id }}\` as a CI source in CompareGold for a visual review.
          EOF

  windows:
    if: ${{ inputs.windows }}
    uses: ./.github/workflows/test-windows-game.yml
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type }}
      graphics-api: ${{ inputs.graphics-api }}
      test-filter: ${{ inputs.test-filter }}
      project: ${{ inputs.project }}
      commit-sha: ${{ inputs.commit-sha }}
      # Generating new gold makes tests "fail" (missing/changed reference) — expected; tolerate it so
      # the run stays green and doesn't email. Build failures still fail (the Build step isn't gated).
      tolerate-test-failures: true

  linux:
    if: ${{ inputs.linux }}
    uses: ./.github/workflows/test-linux-game.yml
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type }}
      test-filter: ${{ inputs.test-filter }}
      project: ${{ inputs.project }}
      commit-sha: ${{ inputs.commit-sha }}
      # Generating new gold makes tests "fail" (missing/changed reference) — expected; tolerate it so
      # the run stays green and doesn't email. Build failures still fail (the Build step isn't gated).
      tolerate-test-failures: true

  macos:
    if: ${{ inputs.macos }}
    uses: ./.github/workflows/test-macos-game.yml
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type }}
      test-filter: ${{ inputs.test-filter }}
      project: ${{ inputs.project }}
      commit-sha: ${{ inputs.commit-sha }}
      # Generating new gold makes tests "fail" (missing/changed reference) — expected; tolerate it so
      # the run stays green and doesn't email. Build failures still fail (the Build step isn't gated).
      tolerate-test-failures: true

  android:
    if: ${{ inputs.android }}
    uses: ./.github/workflows/test-android-game.yml
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type }}
      test-filter: ${{ inputs.test-filter }}
      project: ${{ inputs.project }}
      commit-sha: ${{ inputs.commit-sha }}
      # Generating new gold makes tests "fail" (missing/changed reference) — expected; tolerate it so
      # the run stays green and doesn't email. Build failures still fail (the Build step isn't gated).
      tolerate-test-failures: true

  ios:
    if: ${{ inputs.ios }}
    uses: ./.github/workflows/test-ios-game.yml
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type }}
      test-filter: ${{ inputs.test-filter }}
      project: ${{ inputs.project }}
      commit-sha: ${{ inputs.commit-sha }}
      # Generating new gold makes tests "fail" (missing/changed reference) — expected; tolerate it so
      # the run stays green and doesn't email. Build failures still fail (the Build step isn't gated).
      tolerate-test-failures: true

  # Merge every platform's tests/local/ output into one downloadable zip. Review + promotion
  # happen in CompareGold (per-pixel compare, visual diff, dedup-aware promote), not here.
  gather:
    needs: [windows, linux, macos, android, ios]
    if: ${{ always() && (inputs.windows || inputs.linux || inputs.macos || inputs.android || inputs.ios) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download generated images
        uses: actions/download-artifact@v8
        with:
          pattern: test-artifacts-*
          path: gold-staging
          merge-multiple: true
      - name: List combined output
        run: |
          # merge-multiple flattens the per-platform artifacts into one <Assembly>/<Platform.Api>/...
          # tree, mirroring tests/local/ — the layout CompareGold expects for a source.
          mkdir -p gold-staging
          find gold-staging -type f | sed 's|^gold-staging/||' | sort | head -200
          COUNT=$(find gold-staging -type f | wc -l)
          echo "Total files: $COUNT"
          # Zero renders = the platform jobs were cancelled/superseded or produced nothing.
          # Fail here so promote (gated on gather success) skips instead of failing on a
          # missing gold-images artifact.
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No renders gathered from any platform job."
            exit 1
          fi
      - name: Upload combined gold images
        uses: actions/upload-artifact@v7
        with:
          name: gold-images
          path: gold-staging/
          if-no-files-found: warn

  # Tolerance-aware promote (CompareGold headless), landed per the update-gold mode (none = skip).
  promote:
    needs: [gather]
    if: ${{ always() && inputs.update-gold != 'none' && needs.gather.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0
          fetch-tags: true  # tag-based versioning (engine version must dominate sample versions)
          # Compare against the tested commit's gold. A detached commit-sha can't be pushed to, so
          # those runs always land via PR (see can_branch below).
          ref: ${{ inputs.commit-sha || github.ref }}
      - name: Download combined gold images
        uses: actions/download-artifact@v8
        with:
          name: gold-images
          path: gold-staging
      - name: Promote gold (tolerance-aware)
        run: |
          # Absolute path: `dotnet run --project` runs with cwd = the project dir, not the workspace,
          # so a relative --source would resolve against build/tools/Stride.CompareGold/.
          SRC="$GITHUB_WORKSPACE/gold-staging"
          dotnet run --project build/tools/Stride.CompareGold -- promote --source "$SRC" --out "$GITHUB_WORKSPACE/promote-summary.json"
          if [ "${{ inputs.dedup-gold }}" = "true" ]; then
            dotnet run --project build/tools/Stride.CompareGold -- dedup --source "$SRC"
          fi
      - name: Commit and land
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ inputs.update-gold }}
          BRANCH: ${{ github.ref_name }}
          DETACHED: ${{ inputs.commit-sha }}
          DEFAULT: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/
          if git diff --cached --quiet; then
            echo "No gold changes to land."
            exit 0
          fi

          # `auto` commits genuinely-new gold, but routes a PR when review is warranted: any CHANGED
          # existing gold (a changed reference may be a regression), or no pushable branch tip
          # (default branch / detached commit-sha). Resolves to `commit` or `pr`.
          if [ "$MODE" = "auto" ]; then
            CHANGED=$(jq '.Changed | length' "$GITHUB_WORKSPACE/promote-summary.json" 2>/dev/null || echo 0)
            if [ "$CHANGED" -gt 0 ]; then
              echo "::notice::Promote changed $CHANGED existing gold image(s) -- opening a PR for review."
              MODE=pr
            elif [ -n "$DETACHED" ] || [ -z "$BRANCH" ] || [ "$BRANCH" = "$DEFAULT" ]; then
              echo "::notice::No pushable branch tip (default branch / detached) -- opening a PR."
              MODE=pr
            else
              MODE=commit
            fi
          fi

          # bash -eo pipefail (GitHub's default): any failed push / pr-create fails the step -> the
          # run goes red. That's intended — a protected branch or a token without push rights is a
          # real failure to surface, not something to silently downgrade.
          case "$MODE" in
            commit|amend)
              # Explicit choice: push straight to the dispatched branch tip, never a PR. If there's
              # no tip to push (detached commit-sha), fail rather than guess -- use auto/pr there.
              if [ -n "$DETACHED" ] || [ -z "$BRANCH" ]; then
                echo "::error::update-gold=$MODE needs a branch tip, but this run tested a detached commit (${DETACHED:-unknown}). Use update-gold=pr or auto."
                exit 1
              fi
              if [ "$MODE" = "amend" ]; then
                git commit --amend --no-edit
                git push --force-with-lease origin "HEAD:$BRANCH"
                echo "Amended last commit on $BRANCH."
              else
                git commit -m "Update gold images"
                git push origin "HEAD:$BRANCH"
                echo "Committed gold to $BRANCH."
              fi
              ;;
            pr)
              git commit -m "Update gold images"
              PR_BRANCH="gold-update/${{ github.run_id }}"
              git push origin "HEAD:$PR_BRANCH"
              gh pr create --base "${BRANCH:-$DEFAULT}" --head "$PR_BRANCH" \
                --title "Update gold images" \
                --body "Automated gold update from test-gold-gen run ${{ github.run_id }}."
              echo "Opened PR from $PR_BRANCH."
              ;;
          esac
