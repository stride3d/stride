name: Test Windows (Simple)

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build
        default: Debug
        type: choice
        options:
          - Debug
          - Release
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string

concurrency:
  group: test-windows-simple-${{ github.event.pull_request.number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  Windows-Tests:
    name: Test (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}, Simple)
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: |
          dotnet build build\Stride.Tests.Simple.slnf `
            -p:StrideNativeBuildMode=Clang `
            -m:1 -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StridePlatforms=Windows `
            -p:StrideGraphicsApis=Direct3D11
      - name: Start screenshot watchdog
        shell: pwsh
        run: |
          Start-Job -Name ScreenshotWatchdog -ScriptBlock {
            Add-Type -AssemblyName System.Windows.Forms
            while ($true) {
              Start-Sleep -Seconds 30
              try {
                $bitmap = [System.Drawing.Bitmap]::new([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width, [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
                [System.Drawing.Graphics]::FromImage($bitmap).CopyFromScreen(0, 0, 0, 0, $bitmap.Size)
                $bitmap.Save("$env:GITHUB_WORKSPACE\screenshot.png")
              } catch {}
            }
          }
      - name: Test
        timeout-minutes: 20
        run: |
          dotnet test build\Stride.Tests.Simple.slnf `
            --no-build `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
      - name: Stop screenshot watchdog
        if: always()
        shell: pwsh
        run: Get-Job -Name ScreenshotWatchdog -ErrorAction SilentlyContinue | Stop-Job -PassThru | Remove-Job
      - name: Upload debug artifacts
        if: cancelled() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-simple
          path: screenshot.png
          if-no-files-found: ignore
