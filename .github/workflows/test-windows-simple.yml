name: Test Windows (Simple)

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build
        default: Debug
        type: choice
        options:
          - Debug
          - Release
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
  repository_dispatch:
    # Fired by chatops bot. Payload: { pr_number, dispatched_by }.
    types: [test-windows-simple]


concurrency:
  group: test-windows-simple-${{ github.event.pull_request.number || github.event.client_payload.pr_number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  Windows-Tests:
    name: Test (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}, Simple)
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event.client_payload.pr_number && format('refs/pull/{0}/merge', github.event.client_payload.pr_number) || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: |
          dotnet build build\Stride.Tests.Simple.slnf `
            -p:StrideTestRuntimeIdentifier=win-x64 `
            -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StridePlatforms=Windows `
            -p:StrideGraphicsApis=Direct3D11
      - name: Test
        run: |
          dotnet test build\Stride.Tests.Simple.slnf `
            --no-build `
            --logger:trx --results-directory TestResults `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
      - name: Publish Test Report
        if: always()
        uses: phoenix-actions/test-reporting@v15
        with:
          name: 'Test Report: Windows Simple'
          path: TestResults/*.trx
          reporter: dotnet-trx
          output-to: step-summary
          list-tests: 'failed'
