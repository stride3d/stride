name: Build Visual Studio Package

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build Configuration
        default: Debug
        type: choice
        options:
          - Debug
          # - Release # has a bug and cannot build
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string

concurrency:
  group: build-vs-package-${{ github.event.pull_request.number || github.ref }}-${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }}
  cancel-in-progress: true

jobs:
  #
  # Build Visual Studio Package
  #
  VS-Package:
    name: Visual Studio Package (${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }})
    runs-on: windows-2025-vs2026
    steps:
      # Bootstrap .github so the local composite action below is resolvable pre-checkout.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/stride-checkout
        with:
          ref: ${{ github.ref }}
          exclude: samples
      - name: Build
        run: |
          dotnet build build\Stride.VisualStudio.slnx `
            -nr:false `
            -v:m -p:WarningLevel=0 `
            -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type || 'Debug' }} `
            -p:StrideSkipUnitTests=true `
            -p:StrideSkipAutoPack=true
