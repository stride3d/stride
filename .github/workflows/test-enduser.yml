name: Test End-User

run-name: >-
  ${{ github.event.inputs.commit-sha != '' && format('Test End-User @ {0}', github.event.inputs.commit-sha) || '' }}

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build
        default: Debug
        type: choice
        options:
          - Debug
          - Release
      commit-sha:
        description: Commit SHA to test (default = HEAD of selected branch)
        type: string
        default: ''
  workflow_call:
    inputs:
      build-type:
        default: Debug
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  schedule:
    # Daily at 04:37 UTC — offset off top-of-hour to avoid GitHub Actions cron load spikes.
    - cron: '37 4 * * *'

concurrency:
  group: test-enduser-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Runs with or without ANTHROPIC_API_KEY. With the key, the LPIPS comparator resolves borderline
  # drift inline via the Claude vision tiebreak. Without it (typical on fork PRs, where secrets aren't
  # exposed), borderline frames are captured and marked "deferred" in <sample>/vision-deferred.json;
  # the pr-screenshot-vision-gate workflow then re-judges them with the key on the uploaded artifacts.
  # Hard LPIPS drift (no vision tiebreak) still fails here regardless of the key.
  #
  # Fork-friendly: schedule fires only when STRIDE_ENABLE_SCHEDULED_CI is set on the repo.
  # workflow_dispatch / workflow_call always run.
  Run:
    if: >
      github.event_name != 'schedule'
      || vars.STRIDE_ENABLE_SCHEDULED_CI == 'true'
    name: Samples (${{ matrix.platform }}, ${{ matrix.graphics-api }})
    # Single job per (OS, graphics API): the harness + orchestrator + comparator are sample-agnostic,
    # so a matrix-per-sample would build the engine N× for the same artifacts. Sequential capture
    # via xunit's DisableParallelization keeps total compute low at comparable wall-clock to a
    # 15-parallel matrix. Per-API parallelism is unavoidable (each API needs its own engine build);
    # Linux only ships Vulkan, so one entry there.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2025-vs2026, platform: Windows, graphics-api: Direct3D11, rid: win-x64 }
          - { os: windows-2025-vs2026, platform: Windows, graphics-api: Direct3D12, rid: win-x64 }
          - { os: windows-2025-vs2026, platform: Windows, graphics-api: Vulkan,     rid: win-x64 }
          - { os: ubuntu-24.04,        platform: Linux,   graphics-api: Vulkan,     rid: linux-x64 }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      # Software rendering is the default in the autotesting harness; set STRIDE_TESTS_GPU=1 to opt into the GPU.
      STRIDE_TESTS_RENDERDOC: "error"
      STRIDE_GRAPHICS_SOFTWARE_RENDERING: "1"
      # Stride.NuGetResolver re-verifies packages per synthetic project (unlike dotnet
      # restore which trusts cached results), tripping on legacy 4.3.0/4.7.0 BCL packages
      # whose timestamping CAs have expired.
      DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
      # Windows-only crash-dump env vars; harmless when the runner OS doesn't honor them.
      # NativeCrashHandler (in the harness + Stride.Graphics.Regression) gates on
      # STRIDE_TESTS_CRASH_DUMPS: without it it sets SEM_NOGPFAULTERRORBOX, which suppresses
      # the WER LocalDumps + DOTNET minidump configured here for pure-native crashes.
      DOTNET_DbgEnableMiniDump: "1"
      DOTNET_DbgMiniDumpType: "1"
      DOTNET_DbgMiniDumpName: "${{ github.workspace }}/crash-dumps/dotnet_%p.dmp"
      STRIDE_TESTS_CRASH_DUMPS: "1"
      STRIDE_TESTS_CRASH_DUMP_DIR: "${{ github.workspace }}/crash-dumps"
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          submodules: true
          # Full history + tags so the engine version dominates the committed samples' versions
          # (otherwise a shallow base version < a sample's version silently skips PackageUpgrader).
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ (github.event.inputs.commit-sha != '' && github.event.inputs.commit-sha) || github.ref }}

      - name: Configure crash dumps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f
          $dumpDir = "${{ github.workspace }}\crash-dumps"
          New-Item -Path $dumpDir -ItemType Directory -Force | Out-Null
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpFolder /t REG_EXPAND_SZ /d $dumpDir /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpType /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpCount /t REG_DWORD /d 10 /f

      - name: Install runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenal-dev libvulkan1 xvfb lld vulkan-validationlayers libva2 libva-drm2 libva-x11-2

      - name: Start virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          # Lavapipe's x11 WSI needs a display server to expose VK_KHR_swapchain,
          # which Stride's GraphicsDevice requires even for pure offscreen rendering.
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # PackageStore at test runtime calls Settings.LoadDefaultSettings(null) which only loads
      # user + machine configs, NOT the workspace's nuget.config (no walkup with null root).
      # Locally this works because the dev's user config has Stride.AutoPackDeploy's
      # %LocalAppData%\stride\nugetdev as a source. CI's runner user has no such config,
      # so add bin/packages explicitly to the user config. --configfile forces the write to
      # the user config rather than walking up to the workspace's nuget.config (which would
      # conflict with the existing 'stride-local' source declared there).
      - name: Register bin/packages with user NuGet config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path "$env:APPDATA\NuGet" -ItemType Directory -Force | Out-Null
          dotnet nuget add source "${{ github.workspace }}\bin\packages" --name stride-local --configfile "$env:APPDATA\NuGet\NuGet.Config"

      - name: Register bin/packages with user NuGet config (Linux)
        if: runner.os == 'Linux'
        run: |
          # `dotnet nuget add source --configfile` requires the target file to exist; Linux
          # runners ship without a user NuGet.Config (Windows runners have one preseeded
          # with nuget.org). Pre-populate it with nuget.org so the synthetic Lavapipe-fetch
          # project below — which restores from outside the workspace and thus doesn't see
          # the workspace nuget.config — can still resolve public packages.
          mkdir -p "$HOME/.nuget/NuGet"
          [ -f "$HOME/.nuget/NuGet/NuGet.Config" ] || cat > "$HOME/.nuget/NuGet/NuGet.Config" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          EOF
          dotnet nuget add source "${{ github.workspace }}/bin/packages" --name stride-local --configfile "$HOME/.nuget/NuGet/NuGet.Config"

      # Stride.Games.AutoTesting must be built explicitly so its auto-pack-deploy lands the .nupkg
      # in bin/packages — the sample projects consume it via <PackageReference>, not via the
      # ProjectReference graph the test project would otherwise transitively pull. The engine
      # is built with StrideGraphicsApis pinned to the matrix entry so the resulting nupkg only
      # contains binaries for that API; the regenerated samples then link against those.
      - name: Build harness assembly (packs Stride.Games.AutoTesting into bin/packages)
        run: |
          dotnet build sources/engine/Stride.Games.AutoTesting/Stride.Games.AutoTesting.csproj \
            -nr:false -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=${{ matrix.platform }} \
            -p:StrideGraphicsApi=${{ matrix.graphics-api }} \
            -p:StrideGraphicsApis=${{ matrix.graphics-api }}

      # Install Stride.Dependencies.Lavapipe and register its ICD with the Vulkan loader
      # so the samples' Vulkan path resolves a software driver on the CI runner (no GPU).
      # On Windows the loader reads HKLM\SOFTWARE\Khronos\Vulkan\Drivers — VK_DRIVER_FILES
      # env var alone isn't reliable across runner Vulkan SDK versions.
      - name: Install Lavapipe and register its Vulkan ICD (Windows / Vulkan)
        if: runner.os == 'Windows' && matrix.graphics-api == 'Vulkan'
        shell: pwsh
        run: |
          $tmpDir = "${{ runner.temp }}\lavapipe-fetch"
          New-Item -ItemType Directory -Path $tmpDir -Force | Out-Null
          Set-Content -Path "$tmpDir\LavapipeFetch.csproj" -Value '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><TargetFramework>net10.0</TargetFramework></PropertyGroup></Project>'
          dotnet add "$tmpDir\LavapipeFetch.csproj" package Stride.Dependencies.Lavapipe
          $icd = Get-ChildItem -Recurse -Path "$env:USERPROFILE\.nuget\packages\stride.dependencies.lavapipe" -Filter "lvp_icd*.json" -ErrorAction SilentlyContinue | Where-Object { $_.DirectoryName -match 'win-x64' } | Select-Object -First 1
          if (-not $icd) { throw "Lavapipe ICD not found in NuGet cache after restore." }
          New-Item -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Name $icd.FullName -Value 0 -PropertyType DWord -Force | Out-Null
          Write-Host "Registered Lavapipe ICD: $($icd.FullName)"

      # On Linux the Vulkan loader honors VK_DRIVER_FILES → point it at the linux-x64
      # Lavapipe .so shipped inside the Stride.Dependencies.Lavapipe nupkg.
      - name: Install Lavapipe and register its Vulkan ICD (Linux / Vulkan)
        if: runner.os == 'Linux' && matrix.graphics-api == 'Vulkan'
        run: |
          tmpDir="${{ runner.temp }}/lavapipe-fetch"
          mkdir -p "$tmpDir"
          cat > "$tmpDir/LavapipeFetch.csproj" <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup><TargetFramework>net10.0</TargetFramework></PropertyGroup>
          </Project>
          EOF
          dotnet add "$tmpDir/LavapipeFetch.csproj" package Stride.Dependencies.Lavapipe
          LIB=$(find ~/.nuget/packages/stride.dependencies.lavapipe -path "*/runtimes/linux-x64/native/libvulkan_lvp.so" | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::Lavapipe libvulkan_lvp.so not found in NuGet cache"
            exit 1
          fi
          LIB_ABS=$(readlink -f "$LIB")
          ICD_JSON="$PWD/lvp_icd.json"
          echo "{\"file_format_version\":\"1.0.0\",\"ICD\":{\"library_path\":\"$LIB_ABS\",\"api_version\":\"1.3.0\"}}" > "$ICD_JSON"
          echo "VK_DRIVER_FILES=$ICD_JSON" >> $GITHUB_ENV
          echo "Registered Lavapipe ICD: $ICD_JSON -> $LIB_ABS"

      # Builds the test project plus its transitive ProjectReferences. StrideGraphicsApi (singular)
      # selects the test SDK output path; StrideGraphicsApis (plural) keeps the engine deps aligned
      # with the harness build above.
      - name: Build test project
        run: |
          dotnet build tests/enduser/Stride.Samples.Tests/Stride.Samples.Tests.csproj \
            -nr:false -v:m -p:WarningLevel=0 \
            -p:Configuration=${{ inputs.build-type || 'Debug' }} \
            -p:StridePlatforms=${{ matrix.platform }} \
            -p:StrideTestRuntimeIdentifier=${{ matrix.rid }} \
            -p:StrideGraphicsApi=${{ matrix.graphics-api }} \
            -p:StrideGraphicsApis=${{ matrix.graphics-api }}

      - name: Run sample screenshot tests
        env:
          # Comparator opts a few non-deterministic tests (ParticlesSample, SpriteStudioDemo,
          # AnimatedModel) into a Claude vision second-opinion when LPIPS is over threshold.
          # Key is bound to a budget-capped Anthropic workspace; the fallback only runs on
          # frames that already failed LPIPS so cost is bounded even when noisy.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          dotnet test tests/enduser/Stride.Samples.Tests/Stride.Samples.Tests.csproj \
            --no-build \
            --filter "FullyQualifiedName~Stride.Samples.Tests.SampleScreenshotTests" \
            --logger "trx;LogFileName=screenshots.trx" \
            --results-directory TestResults \
            -p:Configuration=${{ inputs.build-type || 'Debug' }} \
            -p:StrideGraphicsApi=${{ matrix.graphics-api }}

      - name: Publish test report
        if: always()
        uses: phoenix-actions/test-reporting@v16
        with:
          name: 'Sample screenshot regression (${{ matrix.platform }}, ${{ matrix.graphics-api }})'
          path: TestResults/*.trx
          reporter: dotnet-trx
          output-to: step-summary
          list-tests: 'failed'

      - name: Upload test artifacts (captures + done.json + TRX)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.platform }}-${{ matrix.graphics-api }}
          path: |
            screenshot-out/
            screenshot-out-aot/
            TestResults/
          if-no-files-found: warn

      - name: Upload crash dumps (Windows)
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: crash-dumps-${{ matrix.platform }}-${{ matrix.graphics-api }}
          path: crash-dumps/
          if-no-files-found: ignore

  # NuGet packaging + consumer suite. Deliberately independent of the screenshot job: it builds the
  # engine into bin/packages itself, then packs a sample plugin and builds a consumer against it, plus
  # an external-consumer build of a generated sample. Running in parallel (not chained behind the slow
  # screenshot job) gives packaging feedback at ~build time and needs no Anthropic key, so it also
  # covers forks. The duplicate engine build is the intended cost of that decoupling. Carries the same
  # schedule/fork gate as preflight so it doesn't depend on (and serialize behind) that job.
  Packaging:
    if: github.event_name != 'schedule' || vars.STRIDE_ENABLE_SCHEDULED_CI == 'true'
    name: Packaging + consumer (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2025-vs2026, platform: Windows }
          - { os: ubuntu-24.04,        platform: Linux }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      # Stride.NuGetResolver re-verifies packages per synthetic project (unlike dotnet restore),
      # tripping on legacy BCL packages whose timestamping CAs have expired.
      DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          submodules: true
          ref: ${{ (github.event.inputs.commit-sha != '' && github.event.inputs.commit-sha) || github.ref }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lld

      # The consumer-template generation (NuGetConsumerTests → PackageStore) reads the *user* NuGet
      # config (Settings.LoadDefaultSettings(null) ignores the workspace config), so register the
      # locally-built feed there. Mirrors the screenshot job. The path is recorded now; the build
      # below populates it.
      - name: Register bin/packages with user NuGet config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path "$env:APPDATA\NuGet" -ItemType Directory -Force | Out-Null
          dotnet nuget add source "${{ github.workspace }}\bin\packages" --name stride-local --configfile "$env:APPDATA\NuGet\NuGet.Config"

      - name: Register bin/packages with user NuGet config (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$HOME/.nuget/NuGet"
          [ -f "$HOME/.nuget/NuGet/NuGet.Config" ] || cat > "$HOME/.nuget/NuGet/NuGet.Config" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          EOF
          dotnet nuget add source "${{ github.workspace }}/bin/packages" --name stride-local --configfile "$HOME/.nuget/NuGet/NuGet.Config"

      # Build + test in one invocation: the test project's ProjectReferences pack the engine into
      # bin/packages, then the pack/consume + external-consumer tests run against it. StridePlatforms
      # is required for the test SDK to emit the test assembly (host platform; graphics API defaults
      # per OS — D3D11 on Windows, Vulkan on Linux — and is irrelevant to these headless build tests).
      - name: Run packaging + consumer tests
        run: |
          dotnet test tests/enduser/Stride.Packaging.Tests/Stride.Packaging.Tests.csproj \
            -nr:false -v:m -p:WarningLevel=0 \
            -p:StridePlatforms=${{ matrix.platform }} \
            --logger "trx;LogFileName=packaging.trx" \
            --results-directory TestResults \
            -p:Configuration=${{ inputs.build-type || 'Debug' }}

      - name: Publish test report
        if: always()
        uses: phoenix-actions/test-reporting@v16
        with:
          name: 'Packaging + consumer (${{ matrix.platform }})'
          path: TestResults/*.trx
          reporter: dotnet-trx
          output-to: step-summary
          list-tests: 'failed'

      - name: Upload test artifacts (TRX)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packaging-${{ matrix.platform }}
          path: TestResults/
          if-no-files-found: warn
