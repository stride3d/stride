name: PR draft welcome

# Posts a one-time hint comment on draft PRs explaining that automatic CI is skipped
# and how to opt into CI suites via ci-* labels. Triggered on PR open (if
# draft) and on transitions to draft. Idempotent via a hidden marker — same PR
# transitioning open ↔ draft won't get duplicate hints.
#
# Uses pull_request_target so the default GITHUB_TOKEN has write perms for fork PRs
# too (the standard pull_request event ships a read-only token from fork heads).
# Safe because the workflow only reads the event payload and posts a comment — it
# never checks out or executes PR-supplied code.

on:
  pull_request_target:
    types: [opened, converted_to_draft]

permissions:
  pull-requests: write

jobs:
  welcome:
    if: github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const MARKER = '<!-- ci-draft-hint -->';
            const pr = context.payload.pull_request;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, per_page: 100,
            });
            if (comments.some(c => (c.body || '').includes(MARKER))) {
              core.info('Draft hint already posted, skipping.');
              return;
            }
            const body = [
              '🤖 Draft PR — automatic CI is skipped to save runner minutes.',
              '',
              '- Mark the PR **ready for review** to run the full automatic CI — or add a `ci-run-on-draft` label to run it now without leaving draft.',
              '- Or arm a specific opt-in suite: `ci-enduser`, `ci-editor`, `ci-ios`, `ci-android`.',
              '',
              MARKER,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
