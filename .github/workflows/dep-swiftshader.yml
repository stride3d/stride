name: "Dep: Build & Deploy SwiftShader"

on:
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version (e.g. 1.0.0)
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build SwiftShader (Windows x64)
    runs-on: windows-2025-vs2026
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout SwiftShader
        uses: actions/checkout@v4
        with:
          repository: google/swiftshader
          submodules: recursive
          path: swiftshader-src

      - name: Build
        shell: pwsh
        run: |
          cmake -S swiftshader-src -B swiftshader-build -Thost=x64 -DSWIFTSHADER_BUILD_TESTS=OFF -DSWIFTSHADER_BUILD_BENCHMARKS=OFF
          cmake --build swiftshader-build --config RelWithDebInfo --target vk_swiftshader

      - name: Prepare package contents
        shell: pwsh
        run: |
          $destDir = "build/deps/swiftshader"
          Copy-Item swiftshader-build/RelWithDebInfo/vk_swiftshader.dll $destDir/
          Copy-Item swiftshader-build/RelWithDebInfo/vk_swiftshader.pdb $destDir/
          Copy-Item swiftshader-build/RelWithDebInfo/vk_swiftshader_icd.json $destDir/

      - name: Pack NuGet
        shell: pwsh
        run: |
          $commitHash = git -C swiftshader-src rev-parse --short HEAD
          nuget pack build/deps/swiftshader/Stride.Dependencies.SwiftShader.nuspec `
            -Version ${{ github.event.inputs.version }} `
            -Properties "commit=$commitHash" `
            -OutputDirectory nupkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stride.Dependencies.SwiftShader.${{ github.event.inputs.version }}.nupkg
          path: nupkg/*.nupkg

  publish:
    name: Publish to NuGet.org
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Stride.Dependencies.SwiftShader.${{ github.event.inputs.version }}.nupkg

      - name: Publish
        run: |
          dotnet nuget push *.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
