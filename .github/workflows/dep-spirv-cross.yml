name: "Dep: Build & Deploy SPIRV-Cross"

on:
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version (leave empty for date-based)
        required: false
      branch:
        description: SPIRV-Cross branch to build
        default: hlsl_tessel_shader
        required: false

jobs:
  build-windows:
    name: Build SPIRV-Cross (Windows x64)
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout Stride
        uses: actions/checkout@v4

      - name: Checkout SPIRV-Cross
        uses: actions/checkout@v4
        with:
          repository: stride3d/SPIRV-Cross
          ref: ${{ github.event.inputs.branch || 'hlsl_tessel_shader' }}
          path: spirv-cross-src

      - name: Build
        shell: pwsh
        run: |
          cmake -S spirv-cross-src -B spirv-cross-build -Thost=x64 `
            -DSPIRV_CROSS_SHARED=ON `
            -DSPIRV_CROSS_CLI=OFF `
            -DSPIRV_CROSS_ENABLE_TESTS=OFF
          cmake --build spirv-cross-build --config Release --target spirv-cross-c-shared

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: spirv-cross-win-x64
          path: spirv-cross-build/Release/spirv-cross-c-shared.dll

  pack:
    name: Pack & Publish NuGet
    needs: [build-windows]
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout SPIRV-Cross (for commit hash)
        uses: actions/checkout@v4
        with:
          repository: stride3d/SPIRV-Cross
          ref: ${{ github.event.inputs.branch || 'hlsl_tessel_shader' }}
          path: spirv-cross-src
          fetch-depth: 1

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: spirv-cross-win-x64
          path: artifacts/win-x64

      - name: Prepare package contents
        shell: pwsh
        run: |
          $destDir = "build/deps/spirv-cross"
          New-Item -Path "$destDir/win-x64" -ItemType Directory -Force | Out-Null
          # Silk.NET expects the DLL named "spirv-cross"
          Copy-Item artifacts/win-x64/spirv-cross-c-shared.dll "$destDir/win-x64/spirv-cross.dll"

      - name: Pack NuGet
        shell: pwsh
        run: |
          $commitHash = git -C spirv-cross-src rev-parse --short HEAD
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = (Get-Date -Format "yyyy.M.d") }
          nuget pack build/deps/spirv-cross/Stride.Dependencies.SpirvCross.nuspec `
            -Version $version `
            -Properties "commit=$commitHash" `
            -OutputDirectory nupkg
          echo "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stride.Dependencies.SpirvCross.nupkg
          path: nupkg/*.nupkg

  publish:
    name: Sign & Publish to NuGet.org
    needs: pack
    runs-on: windows-2025-vs2026
    environment: production
    steps:
      - name: Install signing tool
        run: dotnet tool install sign --tool-path ./sign-tool --version 0.9.0-beta.23127.3

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Stride.Dependencies.SpirvCross.nupkg

      - name: Sign NuGet package
        shell: pwsh
        run: |
          ./sign-tool/sign code azure-key-vault *.nupkg `
            --description "Stride" `
            --description-url "https://stride3d.net" `
            --publisher-name "Stride" `
            --azure-key-vault-tenant-id "${{ secrets.STRIDE_SIGN_TENANT_ID }}" `
            --azure-key-vault-client-id "${{ secrets.STRIDE_SIGN_CLIENT_ID }}" `
            --azure-key-vault-client-secret "${{ secrets.STRIDE_SIGN_CLIENT_SECRET }}" `
            --azure-key-vault-certificate "${{ secrets.STRIDE_SIGN_KEYVAULT_CERTIFICATE }}" `
            --azure-key-vault-url "https://${{ secrets.STRIDE_SIGN_KEYVAULT_NAME }}.vault.azure.net/" `
            -v Information

      - name: Publish
        run: |
          dotnet nuget push *.nupkg --api-key "${{ secrets.STRIDE_NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
