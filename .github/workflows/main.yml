name: CI

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - 'build/**'
      - 'deps/**'
      - 'sources/**'
      - '!**/.all-contributorsrc'
      - '!**/.editorconfig'
      - '!**/.gitignore'
      - '!**/*.md'
      - '!crowdin.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'build/**'
      - 'deps/**'
      - 'sources/**'
      - '!**/.all-contributorsrc'
      - '!**/.editorconfig'
      - '!**/.gitignore'
      - '!**/*.md'
      - '!crowdin.yml'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ### Misc. ###
  Assembly-Processor:
    strategy:
      matrix:
        build-type: [Release]
    uses: ./.github/workflows/build-assembly-processor.yml
    secrets: inherit
    with:
      build-type: ${{ matrix.build-type }}

  VS-Package:
    strategy:
      matrix:
        build-type: [Debug] # Release has a bug and cannot build
    uses: ./.github/workflows/build-vs-package.yml
    secrets: inherit
    with:
      build-type: ${{ matrix.build-type }}

  ### Runtimes ###
  # Android-Runtime:
  #   strategy:
  #     matrix:
  #       build-type: [Release]
  #   uses: ./.github/workflows/build-android.yml
  #   secrets: inherit
  #   with:
  #     build-type: ${{ matrix.build-type }}

  iOS-Runtime:
    strategy:
      matrix:
        build-type: [Release]
    uses: ./.github/workflows/build-ios.yml
    secrets: inherit
    with:
      build-type: ${{ matrix.build-type }}

  Linux-Runtime:
    strategy:
      matrix:
        build-type: [Release]
        graphics-api: [OpenGL, Vulkan]
    uses: ./.github/workflows/build-linux-runtime.yml
    secrets: inherit
    with:
      build-type: ${{ matrix.build-type }}
      graphics-api: ${{ matrix.graphics-api }}

  Windows-Runtime:
    strategy:
      matrix:
        build-type: [Release]
        graphics-api: [Direct3D11, Direct3D12, OpenGL, OpenGLES, Vulkan]
    uses: ./.github/workflows/build-windows-runtime.yml
    secrets: inherit
    with:
      build-type: ${{ matrix.build-type }}
      graphics-api: ${{ matrix.graphics-api }}

  ### Tests ###
  Windows-Tests-Simple:
    needs: Windows-Runtime
    uses: ./.github/workflows/test-windows-simple.yml
    secrets: inherit
    with:
      build-type: Debug

  Windows-Tests-Game:
    needs: Windows-Runtime
    uses: ./.github/workflows/test-windows-game.yml
    secrets: inherit
    with:
      build-type: Debug
